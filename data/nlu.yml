version: "3.1"

nlu:
  - intent: greet
    examples: |
      - هلا
      - مرحبا
      - السلام عليكم
      - السلام
      - هالو
      - أهلاً
      - hi
      - hello
      - hey

  - intent: goodbye
    examples: |
      - مع السلامة
      - باي
      - شكرا جزيلا مع السلامة
      - شكرا باي
      - باي باي
      - خروج
      - goodbye
      - bye

  - intent: bot_challenge
    examples: |
      - هل أنت بشري؟
      - هل أنت روبوت؟
      - من أنت؟
      - انت مين؟
      - are you a bot?
      - are you a robot?

  - intent: ask_admission
    examples: |
      - كيف أقدم على جامعة؟
      - أريد القبول الجامعي المباشر
      - شروط التقديم في الإمارات
      - كم تكاليف الدراسة في المكسيك؟
      - أبي أسجل في جامعة بكندا
      - كيف أسجل في أمريكا؟
      - أريد دراسة ماجستير بزنس
      - bachelor admission guidelines
      - study in USA direct placement

  - intent: ask_visa
    examples: |
      - شروط الفيزا الدراسية
      - كيف أطلع فيزا كندا؟
      - مراجعة الحساب البنكي للتأشيرة
      - هل السفر لأمريكا يتطلب مقابلة سفارة؟
      - visa audit services
      - student visa help

  - intent: ask_tutoring
    examples: |
      - أحتاج مساعدة في حل الاسايمنتات
      - مساعدة في مراجعة Homework
      - أبي مدرس خصوصي لمادة Calculus
      - تجهيز للامتحانات والفيزياء
      - assignment support for CS
      - project help Java

  - intent: provide_name
    examples: |
      - اسمي [أحمد علي](student_name)
      - سعيد الفلاسي
      - أنا [سعيد راشد](student_name)
      - [محمد الكعبي](student_name)
      - My name is [John](student_name)

  - intent: provide_phone
    examples: |
      - رقمي [+971551151364](phone_number)
      - الموبايل هو [0589690014](phone_number)
      - [+966505121314](phone_number)
      - My phone is [+971501111111](phone_number)

  - intent: provide_country
    examples: |
      - أريد الدراسة في [الإمارات](study_country)
      - مهتم بـ [أمريكا](study_country)
      - [المكسيك](study_country)
      - [كندا](study_country)
      - [جنوب أفريقيا](study_country)
      - Study in [Canada](study_country)
